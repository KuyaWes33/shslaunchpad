<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHS Launchpad — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    a { text-decoration: none; }

    :root {
      --green-950:  #061410;
      --green-900:  #0f3d22;
      --green-800:  #165c33;
      --green-700:  #1c7a42;
      --green-600:  #22964f;
      --green-400:  #4dbd74;
      --green-200:  #a7f0be;
      --green-100:  #d1fae5;
      --green-50:   #f0fdf4;
      --amber-400:  #e8a81a;
      --red-500:    #ef4444;
      --red-50:     #fef2f2;
      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-600:   #4b5563;
      --gray-800:   #1f2937;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans:  'Plus Jakarta Sans', -apple-system, sans-serif;
      --ease:       cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body { height: 100%; font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }

    body {
      display: grid; place-items: center;
      min-height: 100vh;
      background: var(--green-900);
      position: relative; overflow: hidden;
      padding: 24px;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='64' height='64' viewBox='0 0 64 64' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cpath d='M32 12v40M12 32h40' stroke='%23ffffff' stroke-width='0.6' stroke-opacity='0.04'/%3E%3Cpath d='M12 12l40 40M52 12L12 52' stroke='%23ffffff' stroke-width='0.4' stroke-opacity='0.025'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    body::after {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 10% 70%, rgba(28,122,66,0.4) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 90% 20%, rgba(232,168,26,0.1) 0%, transparent 55%),
        radial-gradient(ellipse 60% 70% at 50% 110%, rgba(6,20,16,0.7) 0%, transparent 55%);
      pointer-events: none;
    }

    /* ── CARD ── */
    .login-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 440px;
      background: #fff; border-radius: 20px;
      box-shadow: 0 32px 64px rgba(0,0,0,0.25), 0 8px 24px rgba(0,0,0,0.12);
      overflow: hidden;
      animation: cardIn 0.55s var(--ease) both;
    }

    .card-accent {
      height: 4px;
      background: linear-gradient(90deg, var(--green-700), var(--green-500, #22c55e));
    }

    .card-body { padding: 44px 40px 40px; }

    /* ── BRANDING ── */
    .brand-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }

    .brand-emblem {
      width: 56px; height: 56px; background: var(--green-900); border-radius: 14px;
      display: grid; place-items: center;
      box-shadow: 0 4px 12px rgba(15,61,34,0.3); margin-bottom: 16px;
    }
    .brand-emblem svg {
      width: 28px; height: 28px; stroke: white; fill: none;
      stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
    }
    .brand-title {
      font-family: var(--font-serif); font-size: 28px; font-weight: 600;
      color: var(--green-900); line-height: 1.15; letter-spacing: 0.01em;
      margin-bottom: 4px; text-align: center;
    }
    .brand-school {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--green-700); text-align: center;
    }
    .brand-rule { display: flex; align-items: center; gap: 12px; margin: 20px 0 28px; }
    .brand-rule-line { flex: 1; height: 1px; background: var(--gray-200); }
    .brand-rule-diamond { width: 5px; height: 5px; background: var(--amber-400); transform: rotate(45deg); border-radius: 1px; }

    /* ── FORM ── */
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--gray-600);
    }
    .field-input-wrap { position: relative; }
    .field-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; stroke: var(--gray-400); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      pointer-events: none; transition: stroke 0.2s ease;
    }
    .field-input {
      width: 100%; padding: 13px 14px 13px 42px;
      border: 1.5px solid var(--gray-200); border-radius: 10px;
      font-family: var(--font-sans); font-size: 14px;
      color: var(--gray-800); background: #fff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      outline: none;
    }
    .field-input::placeholder { color: var(--gray-400); }
    .field-input:focus { border-color: var(--green-700); box-shadow: 0 0 0 3px rgba(28,122,66,0.12); }
    .field-input-wrap:focus-within .field-icon { stroke: var(--green-700); }

    /* Password field */
    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 2px;
      display: grid; place-items: center; color: var(--gray-400);
      transition: color 0.2s ease;
    }
    .pw-toggle:hover { color: var(--green-700); }
    .pw-toggle svg {
      width: 17px; height: 17px; stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .pw-input { padding-right: 46px !important; }

    /* ── ERROR ── */
    .error-msg {
      display: none; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 8px;
      background: var(--red-50); border: 1px solid #fecaca;
      font-size: 13px; font-weight: 500; color: var(--red-500);
    }
    .error-msg.visible { display: flex; }
    .error-msg svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; flex-shrink: 0; }

    /* ── BUTTON ── */
    .login-btn {
      margin-top: 4px; width: 100%; padding: 14px;
      background: var(--green-900); color: white;
      border: none; border-radius: 10px;
      font-family: var(--font-sans); font-size: 14px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 8px rgba(15,61,34,0.25);
    }
    .login-btn:hover { background: var(--green-800); box-shadow: 0 4px 16px rgba(15,61,34,0.35); }
    .login-btn:active { transform: scale(0.99); }

    /* ── FOOTER NOTE ── */
    .login-note { margin-top: 20px; text-align: center; font-size: 11.5px; color: var(--gray-400); line-height: 1.5; }

    /* ── ANIMATIONS ── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%       { transform: translateX(-9px); }
      30%       { transform: translateX(8px); }
      45%       { transform: translateX(-6px); }
      60%       { transform: translateX(5px); }
      75%       { transform: translateX(-3px); }
      90%       { transform: translateX(2px); }
    }
    .card-shake { animation: shake 0.45s var(--ease); }

    @media (max-width: 480px) {
      .card-body { padding: 36px 24px 32px; }
    }
  </style>
</head>
<body>

  <div class="login-card" id="loginCard">
    <div class="card-accent"></div>
    <div class="card-body">

      <!-- Branding -->
      <div class="brand-wrap">
        <div class="brand-emblem" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M2 4.5C2 4.5 7 3 12 5.5C17 3 22 4.5 22 4.5V19.5C22 19.5 17 18 12 20.5C7 18 2 19.5 2 19.5V4.5Z"/>
            <line x1="12" y1="5.5" x2="12" y2="20.5"/>
          </svg>
        </div>
        <h1 class="brand-title">SHS Launchpad</h1>
        <p class="brand-school">MGC New Life Christian Academy</p>
      </div>

      <div class="brand-rule" aria-hidden="true">
        <div class="brand-rule-line"></div>
        <div class="brand-rule-diamond"></div>
        <div class="brand-rule-line"></div>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm" novalidate>

        <!-- Email -->
        <div class="field-group">
          <label class="field-label" for="emailInput">Email Address</label>
          <div class="field-input-wrap">
            <input class="field-input" type="email" id="emailInput"
              placeholder="you@mgcnewlife.edu.ph"
              autocomplete="email" spellcheck="false">
            <svg class="field-icon" viewBox="0 0 24 24">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="field-label" for="passwordInput">Password</label>
          <div class="field-input-wrap pw-wrap">
            <input class="field-input pw-input" type="password" id="passwordInput"
              placeholder="Enter your password"
              autocomplete="current-password">
            <svg class="field-icon" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
              <svg id="eyeIcon" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Error message -->
        <div class="error-msg" id="errorMsg" role="alert" aria-live="polite">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Incorrect email or password. Please try again.
        </div>

        <!-- Submit -->
        <button type="submit" class="login-btn" id="loginBtn">Sign In</button>

      </form>

      <p class="login-note">Access restricted to authorized personnel only.</p>

    </div>
  </div>


  <script>
    // ── Redirect if already logged in ──────────────────────────────
    if (sessionStorage.getItem('shs_auth')) {
      window.location.replace('index.html');
    }

    // ══════════════════════════════════════════════════════════════
    //  AUTHORIZED USERS
    //  To add more users, add another object to the array:
    //  { email: "name@mgcnewlife.edu.ph", password: "pass" }
    // ══════════════════════════════════════════════════════════════
    const USERS = [
      { email: "wesley.mambiar@mgcnewlife.edu.ph", password: "12345" },
    ];

    // ── Elements ───────────────────────────────────────────────────
    const form          = document.getElementById('loginForm');
    const emailInput    = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const errorMsg      = document.getElementById('errorMsg');
    const loginCard     = document.getElementById('loginCard');
    const pwToggle      = document.getElementById('pwToggle');
    const eyeIcon       = document.getElementById('eyeIcon');

    // ── Password show/hide ─────────────────────────────────────────
    const EYE_OPEN   = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    const EYE_CLOSED = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/>';

    pwToggle.addEventListener('click', () => {
      const show = passwordInput.type === 'password';
      passwordInput.type = show ? 'text' : 'password';
      eyeIcon.innerHTML  = show ? EYE_CLOSED : EYE_OPEN;
      pwToggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      passwordInput.focus();
    });

    // ── Form submit ────────────────────────────────────────────────
    form.addEventListener('submit', e => {
      e.preventDefault();
      const email    = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;
      const match    = USERS.find(u => u.email === email && u.password === password);

      if (match) {
        sessionStorage.setItem('shs_auth', 'true');
        window.location.replace('index.html');
      } else {
        errorMsg.classList.add('visible');
        loginCard.classList.remove('card-shake');
        void loginCard.offsetWidth; // force reflow to restart animation
        loginCard.classList.add('card-shake');
        loginCard.addEventListener('animationend', () => loginCard.classList.remove('card-shake'), { once: true });
        passwordInput.value = '';
        passwordInput.focus();
      }
    });

    // ── Hide error when user starts typing again ───────────────────
    [emailInput, passwordInput].forEach(el => {
      el.addEventListener('input', () => errorMsg.classList.remove('visible'));
    });
  </script>

</body>
</html>
